<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bri's Wild Creations</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background-color: #f8f4ef;
      color: #333;
    }

    header {
      position: relative;
      height: 70vh;
      background: url(https://raw.githubusercontent.com/RiverRunnerWy/Bri-sWildCreations/refs/heads/main/Bri%20WC%20backround.jpeg) center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
    }

    /* DARK OVERLAY */
    header::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.45);
    }

    /* CONTENT ON TOP OF OVERLAY */
    .hero-content {
      position: relative;
      z-index: 1;
      max-width: 600px;
    }

    .hero-content h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.5em;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .hero-content p {
      font-size: 1.2em;
      margin-bottom: 20px;
    }

    .hero-btn {
      background: #d6a77a;
      border: none;
      padding: 12px 25px;
      color: white;
      font-size: 1em;
      border-radius: 25px;
      cursor: pointer;
      transition: 0.3s;
    }

    .hero-btn:hover {
      background: #b88a5f;
    }
  </style>
</head>

<body>

<header>
  <div class="hero-content">
    <h1>Bri's Wild Creations</h1>
    <p>Wildly Beautiful, Handmade Earrings</p>
    <button class="hero-btn" onclick="document.getElementById('shop').scrollIntoView()">Shop Now</button>
  </div>
</header>

<section>
  <h2>Wildly Beautiful, Handmade Earrings</h2>
  <p>Inspired by the West. Made to stand out.</p>
</section>

<section class="products">
  <div class="product">
    <h3>Desert Bloom Drops</h3>
    <p>$19.99</p>
    <button onclick="window.location.href='YOUR_PAYMENT_LINK'">Buy Now</button>
  </div>

  <div class="product">
    <h3>Golden Prairie Hoops</h3>
    <p>$19.99</p>
    <button onclick="window.location.href='YOUR_PAYMENT_LINK'">Buy Now</button>
  </div>
</section>

<section>
  <h2>About</h2>
  <p>Handmade western-boho earrings inspired by open skies and wild spirit.</p>
</section>

</body>
</html>
