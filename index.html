<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bri's Wild Creations</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f8f4ef;
      color: #333;
    }
    header {
      background: url('YOUR_IMAGE_HERE.jpg') center/cover no-repeat;
      height: 60vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }
    header h1 {
      font-size: 3em;
      background: rgba(0,0,0,0.4);
      padding: 10px 20px;
    }
    section {
      padding: 40px 20px;
      text-align: center;
    }
    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
    .product {
      background: white;
      padding: 15px;
      border-radius: 10px;
      width: 200px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    button {
      background: #d6a77a;
      border: none;
      padding: 10px;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<header>
  <h1>Bri's Wild Creations</h1>
</header>

<section>
  <h2>Wildly Beautiful, Handmade Earrings</h2>
  <p>Inspired by the West. Made to stand out.</p>
</section>

<section class="products">
  <div class="product">
    <h3>Desert Bloom Drops</h3>
    <p>$19.99</p>
    <button onclick="window.location.href='YOUR_PAYMENT_LINK'">Buy Now</button>
  </div>

  <div class="product">
    <h3>Golden Prairie Hoops</h3>
    <p>$19.99</p>
    <button onclick="window.location.href='YOUR_PAYMENT_LINK'">Buy Now</button>
  </div>
</section>

<section>
  <h2>About</h2>
  <p>Handmade western-boho earrings inspired by open skies and wild spirit.</p>
</section>

</body>
</html>
